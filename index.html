<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CNPJ - Sistema de Busca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .search-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-weight: 600;
        }

        .filter-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .results-section {
            padding: 30px;
        }

        .company-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .company-name {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
        }

        .company-cnpj {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-label {
            font-size: 0.85em;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1em;
            color: #333;
            font-weight: 600;
        }

        .info-value small {
            font-size: 0.9em;
            color: #6c757d;
            font-weight: normal;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .btn-pdf {
            padding: 12px 25px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .btn-pdf:hover {
            transform: translateY(-2px);
            background: #c82333;
        }

        .btn-share {
            padding: 12px 25px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .btn-share:hover {
            transform: translateY(-2px);
            background: #218838;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 10px;
        }

        .suggestion-box {
            margin-top: 10px;
            padding: 10px;
            background: #e7f3ff;
            border-radius: 8px;
            font-size: 0.9em;
            color: #004085;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Consulta CNPJ</h1>
            <p>Sistema completo de consulta de empresas brasileiras</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Digite CNPJ (apenas números ou formatado), razão social, nome fantasia...">
                <button class="search-btn" onclick="searchCompany()">Buscar</button>
            </div>

            <div class="filter-section">
                <div class="filter-group">
                    <label>Filtrar por:</label>
                    <select class="filter-select" id="filterSelect">
                        <option value="all">Todos os campos</option>
                        <option value="razao_social">Razão Social</option>
                        <option value="nome_fantasia">Nome Fantasia</option>
                        <option value="cnpj">CNPJ</option>
                        <option value="atividade_principal">Atividade Principal</option>
                        <option value="atividades_secundarias">Atividades Secundárias</option>
                        <option value="capital_social">Capital Social</option>
                        <option value="endereco">Endereço</option>
                        <option value="telefone">Telefone</option>
                        <option value="email">E-mail</option>
                        <option value="situacao">Situação Cadastral</option>
                        <option value="data_abertura">Data de Abertura</option>
                        <option value="natureza_juridica">Natureza Jurídica</option>
                        <option value="porte">Porte da Empresa</option>
                        <option value="quadro_societario">Quadro Societário</option>
                        <option value="inscricao_estadual">Inscrição Estadual</option>
                        <option value="inscricao_municipal">Inscrição Municipal</option>
                        <option value="cnae">CNAE</option>
                        <option value="simples">Optante pelo Simples</option>
                        <option value="mei">MEI</option>
                    </select>
                </div>
            </div>
            
            <div class="suggestion-box" id="suggestionBox" style="display: none;">
                💡 Dica: Para buscar por CNPJ, você pode digitar apenas os números (12345678000190) ou formatado (12.345.678/0001-90)
            </div>
        </div>

        <div class="results-section">
            <div class="stats" id="stats" style="display: none;">
                <span id="resultCount">0 resultados encontrados</span>
                <span id="lastUpdate"></span>
            </div>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>Buscando informações...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div id="results"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script>
        // Dados de exemplo para demonstração
        const empresasExemplo = [

                endereco: "Rua Augusta, 500 - Consolação, São Paulo - SP, 01305-000",

                quadro_societario: [
                    { nome: "Carlos Oliveira", participacao: "60%" },
                    { nome: "Ana Souza", participacao: "40%" }
                ],
                inscricao_estadual: "987.654.321.098",
                inscricao_estadual_numeros: "987654321098",
                inscricao_municipal: "5432-1",
                inscricao_municipal_numeros: "54321",
                cnae: "6201-5/01",
                cnae_numeros: "6201501",
                simples: "NÃO",
                mei: "NÃO",
                data_consulta: new Date().toLocaleString()
            },
            {
                razao_social: "CONSTRUTORA NOVA ERA LTDA",
                nome_fantasia: "Nova Era Construtora",
                cnpj: "45.678.901/0001-23",
                cnpj_numeros: "45678901000123",
                atividade_principal: "Construção de edifícios",
                atividades_secundarias: ["Incorporação de empreendimentos imobiliários", "Comércio de materiais de construção"],
                capital_social: "R$ 2.000.000,00",
                endereco: "Av. Brasil, 1500 - Jardim América, Rio de Janeiro - RJ, 20000-000",
                telefone: "(21) 2345-6789",
                email: "contato@novaeraconstrutora.com.br",
                situacao: "ATIVA",
                data_abertura: "10/01/2005",
                natureza_juridica: "Sociedade Empresária Limitada",
                porte: "Empresa de Grande Porte",
                quadro_societario: [
                    { nome: "Roberto Carlos", participacao: "70%" },
                    { nome: "Fernanda Lima", participacao: "30%" }
                ],
                inscricao_estadual: "456.789.012.345",
                inscricao_estadual_numeros: "456789012345",
                inscricao_municipal: "8765-4",
                inscricao_municipal_numeros: "87654",
                cnae: "4120-4/00",
                cnae_numeros: "4120400",
                simples: "NÃO",
                mei: "NÃO",
                data_consulta: new Date().toLocaleString()
            }
        ];

        let dadosAtuais = [];

        // Função para remover formatação de números/documentos
        function removerFormatacao(texto) {
            if (!texto) return '';
            return String(texto).replace(/[^\d]/g, '');
        }

        // Função para normalizar texto (remover acentos e caracteres especiais)
        function normalizarTexto(texto) {
            if (!texto) return '';
            return String(texto)
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase();
        }

        function searchCompany() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const filterType = document.getElementById('filterSelect').value;
            
            if (!searchTerm) {
                showError('Por favor, digite um termo para busca');
                return;
            }

            // Mostrar dica se parecer CNPJ
            const numerosDigitados = removerFormatacao(searchTerm);
            if (numerosDigitados.length >= 11) {
                document.getElementById('suggestionBox').style.display = 'block';
            } else {
                document.getElementById('suggestionBox').style.display = 'none';
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('results').innerHTML = '';

            // Simulando busca com timeout
            setTimeout(() => {
                try {
                    // Preparar termo de busca
                    const termoLower = searchTerm.toLowerCase();
                    const termoNumeros = removerFormatacao(searchTerm);
                    const termoNormalizado = normalizarTexto(searchTerm);
                    
                    console.log('Buscando por:', { original: searchTerm, numeros: termoNumeros, normalizado: termoNormalizado });

                    // Filtra empresas baseado no termo e tipo de filtro
                    let resultados = empresasExemplo.filter(empresa => {
                        if (filterType === 'all') {
                            // Busca em todos os campos (incluindo versões sem formatação)
                            for (let [key, value] of Object.entries(empresa)) {
                                if (key.includes('_numeros')) continue; // Pular campos auxiliares na busca direta
                                
                                if (Array.isArray(value)) {
                                    if (value.some(item => 
                                        String(item).toLowerCase().includes(termoLower) ||
                                        removerFormatacao(item).includes(termoNumeros) ||
                                        normalizarTexto(item).includes(termoNormalizado)
                                    )) return true;
                                } else {
                                    const valorStr = String(value);
                                    if (valorStr.toLowerCase().includes(termoLower) ||
                                        removerFormatacao(valorStr).includes(termoNumeros) ||
                                        normalizarTexto(valorStr).includes(termoNormalizado)) {
                                        return true;
                                    }
                                }
                            }
                            
                            // Busca específica nos campos de números
                            if (termoNumeros) {
                                if (empresa.cnpj_numeros.includes(termoNumeros) ||
                                    empresa.inscricao_estadual_numeros.includes(termoNumeros) ||
                                    empresa.inscricao_municipal_numeros.includes(termoNumeros) ||
                                    empresa.cnae_numeros.includes(termoNumeros)) {
                                    return true;
                                }
                            }
                            
                            return false;
                        } else {
                            // Busca em campo específico
                            const valor = empresa[filterType];
                            
                            // Se for array, verifica cada item
                            if (Array.isArray(valor)) {
                                return valor.some(item => 
                                    String(item).toLowerCase().includes(termoLower) ||
                                    removerFormatacao(item).includes(termoNumeros) ||
                                    normalizarTexto(item).includes(termoNormalizado)
                                );
                            }
                            
                            // Se for string normal
                            const valorStr = String(valor);
                            if (valorStr.toLowerCase().includes(termoLower) ||
                                removerFormatacao(valorStr).includes(termoNumeros) ||
                                normalizarTexto(valorStr).includes(termoNormalizado)) {
                                return true;
                            }
                            
                            // Verifica campo numerico correspondente se existir
                            const campoNumerico = empresa[`${filterType}_numeros`];
                            if (campoNumerico && campoNumerico.includes(termoNumeros)) {
                                return true;
                            }
                            
                            return false;
                        }
                    });

                    console.log('Resultados encontrados:', resultados.length);

                    if (resultados.length > 0) {
                        dadosAtuais = resultados;
                        displayResults(resultados);
                        document.getElementById('stats').style.display = 'flex';
                        document.getElementById('resultCount').textContent = 
                            `${resultados.length} ${resultados.length === 1 ? 'resultado encontrado' : 'resultados encontrados'}`;
                        document.getElementById('lastUpdate').textContent = 
                            `Última atualização: ${new Date().toLocaleString()}`;
                    } else {
                        // Se não encontrou com números, tenta buscar com formatação diferente
                        if (termoNumeros && termoNumeros.length === 14) {
                            showError(`Nenhuma empresa encontrada com o CNPJ ${searchTerm}. Verifique se o número está correto.`);
                        } else {
                            showError('Nenhuma empresa encontrada com os critérios informados');
                        }
                    }
                } catch (error) {
                    console.error('Erro na busca:', error);
                    showError('Erro ao buscar informações. Tente novamente.');
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            }, 1000); // Reduzido para 1 segundo para teste mais rápido
        }

        function displayResults(empresas) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            empresas.forEach(empresa => {
                const card = document.createElement('div');
                card.className = 'company-card';
                card.innerHTML = `
                    <div class="company-header">
                        <span class="company-name">${empresa.razao_social}</span>
                        <span class="company-cnpj">CNPJ: ${empresa.cnpj}</span>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Nome Fantasia</div>
                            <div class="info-value">${empresa.nome_fantasia}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Situação Cadastral</div>
                            <div class="info-value">${empresa.situacao}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Data de Abertura</div>
                            <div class="info-value">${empresa.data_abertura}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Natureza Jurídica</div>
                            <div class="info-value">${empresa.natureza_juridica}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Atividade Principal</div>
                            <div class="info-value">${empresa.atividade_principal}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Atividades Secundárias</div>
                            <div class="info-value">
                                ${empresa.atividades_secundarias.map(atv => `<div>• ${atv}</div>`).join('')}
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Capital Social</div>
                            <div class="info-value">${empresa.capital_social}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Porte da Empresa</div>
                            <div class="info-value">${empresa.porte}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Endereço</div>
                            <div class="info-value">${empresa.endereco}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Telefone</div>
                            <div class="info-value">${empresa.telefone}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">E-mail</div>
                            <div class="info-value">${empresa.email}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">CNAE</div>
                            <div class="info-value">${empresa.cnae}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Inscrição Estadual</div>
                            <div class="info-value">${empresa.inscricao_estadual}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Inscrição Municipal</div>
                            <div class="info-value">${empresa.inscricao_municipal}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Optante pelo Simples</div>
                            <div class="info-value">${empresa.simples}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">MEI</div>
                            <div class="info-value">${empresa.mei}</div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-label">Quadro Societário</div>
                            <div class="info-value">
                                ${empresa.quadro_societario.map(socio => 
                                    `<div>• ${socio.nome} - ${socio.participacao}</div>`
                                ).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn-pdf" onclick='generatePDF(${JSON.stringify(empresa).replace(/'/g, "\\'")})'>
                            📄 Gerar PDF
                        </button>
                        <button class="btn-share" onclick='shareCompany(${JSON.stringify(empresa).replace(/'/g, "\\'")})'>
                            📤 Compartilhar
                        </button>
                    </div>
                `;
                resultsDiv.appendChild(card);
            });
        }

        function generatePDF(empresa) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Configurar fonte
            doc.setFont("helvetica");
            
            // Título
            doc.setFontSize(20);
            doc.setTextColor(102, 126, 234);
            doc.text("RELATÓRIO DE CONSULTA CNPJ", 105, 20, { align: "center" });
            
            // Linha separadora
            doc.setDrawColor(102, 126, 234);
            doc.line(20, 25, 190, 25);
            
            // Data da consulta
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(`Data da consulta: ${new Date().toLocaleString()}`, 20, 35);
            
            // Informações da empresa
            let yPos = 45;
            
            // Função para adicionar linha
            const addLine = (label, value, y) => {
                doc.setFontSize(11);
                doc.setTextColor(0, 0, 0);
                doc.setFont(undefined, 'bold');
                doc.text(`${label}:`, 20, y);
                doc.setFont(undefined, 'normal');
                doc.text(String(value), 70, y);
                return y + 7;
            };
            
            yPos = addLine("Razão Social", empresa.razao_social, yPos);
            yPos = addLine("Nome Fantasia", empresa.nome_fantasia, yPos);
            yPos = addLine("CNPJ", empresa.cnpj, yPos);
            yPos = addLine("Situação", empresa.situacao, yPos);
            yPos = addLine("Data Abertura", empresa.data_abertura, yPos);
            yPos = addLine("Natureza Jurídica", empresa.natureza_juridica, yPos);
            yPos = addLine("Atividade Principal", empresa.atividade_principal, yPos);
            yPos = addLine("Capital Social", empresa.capital_social, yPos);
            yPos = addLine("Porte", empresa.porte, yPos);
            yPos = addLine("Endereço", empresa.endereco, yPos);
            yPos = addLine("Telefone", empresa.telefone, yPos);
            yPos = addLine("E-mail", empresa.email, yPos);
            yPos = addLine("CNAE", empresa.cnae, yPos);
            yPos = addLine("Inscrição Estadual", empresa.inscricao_estadual, yPos);
            yPos = addLine("Inscrição Municipal", empresa.inscricao_municipal, yPos);
            yPos = addLine("Optante Simples", empresa.simples, yPos);
            yPos = addLine("MEI", empresa.mei, yPos);
            
            // Quadro Societário
            doc.setFont(undefined, 'bold');
            doc.text("Quadro Societário:", 20, yPos);
            doc.setFont(undefined, 'normal');
            yPos += 7;
            
            empresa.quadro_societario.forEach(socio => {
                doc.text(`• ${socio.nome} - ${socio.participacao}`, 25, yPos);
                yPos += 7;
            });
            
            // Rodapé
            doc.setFontSize(8);
            doc.setTextColor(150, 150, 150);
            doc.text("Documento gerado por sistema de consulta CNPJ", 105, 280, { align: "center" });
            doc.text("Para verificar a autenticidade, consulte o site da Receita Federal", 105, 285, { align: "center" });
            
            // Salvar PDF
            doc.save(`consulta_cnpj_${empresa.cnpj.replace(/[^\d]/g, '')}.pdf`);
        }

        function shareCompany(empresa) {
            const text = `*DADOS DA EMPRESA*\n\n` +
                        `Razão Social: ${empresa.razao_social}\n` +
                        `CNPJ: ${empresa.cnpj}\n` +
                        `Situação: ${empresa.situacao}\n` +
                        `Telefone: ${empresa.telefone}\n` +
                        `E-mail: ${empresa.email}\n` +
                        `Endereço: ${empresa.endereco}\n\n` +
                        `Consulte mais informações no sistema.`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Dados da Empresa',
                    text: text,
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Informações copiadas para a área de transferência!');
                });
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('stats').style.display = 'none';
        }

        // Permitir busca com Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCompany();
            }
        });

        // Auto-formatar CNPJ enquanto digita (opcional)
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const value = e.target.value;
            // Mostrar/esconder dica baseado no que foi digitado
            const numeros = removerFormatacao(value);
            if (numeros.length >= 11) {
                document.getElementById('suggestionBox').style.display = 'block';
            } else {
                document.getElementById('suggestionBox').style.display = 'none';
            }
        });

        // Adicionar exemplos de busca para teste
        window.onload = function() {
            console.log('Sistema pronto! Exemplos de CNPJ para testar:');
            console.log('12345678000190 (ou 12.345.678/0001-90)');
            console.log('98765432000110 (ou 98.765.432/0001-10)');
            console.log('45678901000123 (ou 45.678.901/0001-23)');
        }
    </script>
